version: 1
rules:
  package_blocklist:
  - name: litellm
    versions:
    - 1.82.8
    - 1.82.7
    reason: Supply chain attack
    severity: critical
  - name: reqeusts
    versions:
    - 1.0.0
    reason: MERCK learned exact block
    severity: high
  - name: llm-utils
    versions:
    - 0.0.1
    reason: MERCK learned exact block
    severity: high
  reputation_thresholds:
    block_below_score: 10
    warn_below_score: 30
  typosquatting:
    enabled: true
  behavioral_signals:
    block_if:
    - opens_network_socket_during_install
    warn_if: []
  mcp_rules:
    block_if:
    - exact_target: npm:postmark-mcp@1.0.0
    warn_if: []
  domain_blocklist:
  - collect-data.evil.com
  domain_patterns:
    block_if: []
    warn_if: []
  regex_patterns:
    block_if: []
    warn_if: []
  package_name_patterns:
    block_if: []
    warn_if:
    - ai-helper-toolkit
